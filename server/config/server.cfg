## ----------------------------------------------------
## RP Localhost Server (Windows)
## ----------------------------------------------------

# Basis
sv_hostname "RP Localhost DE"
sets sv_projectName "RP Local Server"
sets sv_projectDesc "Lokaler FiveM Roleplay Server (Spielerfokus)"
sv_maxclients 8
sv_enforceGameBuild 3258
sets locale "de-DE"

# Netzwerk (localhost)
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_lan 0

# OneSync
## [txAdmin CFG validator]: onesync MUST only be set in the txAdmin settings page.
# set onesync on

# Sicherheit / Verbindung
sv_scriptHookAllowed 0
sv_endpointprivacy true

sv_licenseKey "cfxk_NBfzaTwwirBTKuS9eCyo_4MicpV" 

# Datenbank (lokal)
# Key=Value Format, lokal ohne Passwort
set mysql_connection_string "user=root;password=;host=127.0.0.1;port=3306;database=rp_local;charset=utf8mb4"

# Ressourcenpfad
set resources_useSystemChat false
set chat_showJoins 0
set chat_showQuits 0

# Executed configs
exec config/permissions_placeholder.cfg

# -----------------------------------------------------
# Dependencies
# -----------------------------------------------------
ensure async
ensure oxmysql
ensure es_extended

# -----------------------------------------------------
# Base FiveM Resources
# -----------------------------------------------------
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure hardcap
ensure rconlog

# -----------------------------------------------------
# Vehicle Addons
# -----------------------------------------------------
ensure [autos]

# -----------------------------------------------------
# RP Core Resources (Load Order)
# -----------------------------------------------------
ensure rp_notifications
ensure rp_interactions
ensure rp_core
ensure rp_identity
ensure rp_skin
ensure rp_spawn
ensure rp_money
ensure rp_inventory
ensure rp_shops
ensure rp_bank
ensure rp_vehicles
ensure rp_garage
ensure rp_jobs
ensure rp_hud
ensure rp_phone_optional

# -----------------------------------------------------
# Maps
# -----------------------------------------------------
ensure 

# Optional Admin Resource
ensure rp_admin

# Logs
setr rp_debugMode false

# Optional txAdmin compatibility
set sv_listingHostOverride ""
